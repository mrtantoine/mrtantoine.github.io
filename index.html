	<script>
		async function fetchRSSFeed() {
			const rssUrl = 'https://feeds.feedburner.com/HaveIBeenPwnedLatestBreaches';
	
			try {
				const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
				const data = await response.json();
				const parser = new DOMParser();
				const xml = parser.parseFromString(data.contents, "application/xml");
				displayRSSContent(xml);
			} catch (error) {
				console.error('Error fetching RSS feed:', error);
			}
		}
	
		function displayRSSContent(xml) {
			const rssContent = document.getElementById('rss-content');
			const items = xml.querySelectorAll("item");
	
			items.forEach((item, index) => {
				if (index < 5) { // Limiter à 5 éléments
					const title = item.querySelector("title").textContent;
					const link = item.querySelector("link").textContent;
					const category = item.querySelector("category") ? item.querySelector("category").textContent : "Données volées";
	
					const rssBlock = document.createElement('div');
					rssBlock.classList.add('rss-block_one');
	
					rssBlock.innerHTML = `
						<div class="rss-block_one-inner">
							<div class="rss-block_one-title">${category}</div>
							<h5 class="rss-block_one-heading">
								<a href="${link}" target="_blank">${title}</a>
							</h5>
							<a href="${link}" target="_blank" class="rss-block_one-arrow fa-solid fa-arrow-right fa-fw"></a>
						</div>
					`;
	
					rssContent.appendChild(rssBlock);
				}
			});
		}
	
		// Appel de la fonction pour charger et afficher le flux RSS
		fetchRSSFeed();
	</script>
